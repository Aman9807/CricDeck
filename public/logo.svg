<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Color Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="darkBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="100%" stop-color="#0369A1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAB308" />
      <stop offset="100%" stop-color="#CA8A04" />
    </linearGradient>
    <linearGradient id="bailOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>
    <linearGradient id="bailYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FACC15" />
      <stop offset="100%" stop-color="#EAB308" />
    </linearGradient>

    <!-- Drop shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Group with a subtle drop shadow for depth -->
  <g filter="url(#shadow)">
    
    <!-- 1. Background decorative translucent shapes -->
    <!-- Soft yellow circles -->
    <circle cx="160" cy="230" r="45" fill="#FBBF24" opacity="0.85" />
    <circle cx="320" cy="310" r="45" fill="#FBBF24" opacity="0.9" />
    
    <!-- Background diagonal cream & light blue accents -->
    <rect x="80" y="295" width="200" height="24" rx="12" fill="#FEF3C7" transform="rotate(-40 180 307)" opacity="0.7" />
    <rect x="130" y="325" width="160" height="20" rx="10" fill="#E0F2FE" transform="rotate(-40 210 335)" opacity="0.8" />
    
    <!-- 2. Ascending Arrows (Behind Stumps and Bat) -->
    <!-- Large Blue Arrow pointing up-right -->
    <path d="M 120 320 
             L 380 90 
             L 360 70 
             L 420 70 
             L 420 130 
             L 400 110 
             L 140 340 Z" fill="url(#blueGrad)" />

    <!-- Smaller Orange/Yellow Arrow pointing up-right -->
    <path d="M 190 380 
             L 380 200 
             L 370 190 
             L 415 190 
             L 415 235 
             L 405 225 
             L 210 400 Z" fill="url(#yellowGrad)" />

    <!-- 3. Three Wicket Stumps -->
    <!-- Left Blue Stump -->
    <rect x="180" y="130" width="24" height="180" rx="4" fill="url(#blueGrad)" />
    <!-- Middle Orange Stump -->
    <rect x="238" y="130" width="24" height="200" rx="4" fill="url(#orangeGrad)" />
    <!-- Right Yellow/Gold Stump -->
    <rect x="296" y="130" width="24" height="180" rx="4" fill="url(#yellowGrad)" />

    <!-- 4. Two Bails on Top -->
    <!-- Left Orange Bail -->
    <g transform="translate(178, 92) rotate(-12)">
      <path d="M 0 10 Q 15 5 30 10 Q 35 15 40 10 Q 55 5 70 10 L 68 18 H 2 L 0 10 Z" fill="url(#bailOrange)" />
      <!-- Groves on the left bail -->
      <circle cx="10" cy="12" r="3" fill="#EA580C" />
      <circle cx="20" cy="12" r="3" fill="#EA580C" />
      <circle cx="50" cy="12" r="3" fill="#EA580C" />
      <circle cx="60" cy="12" r="3" fill="#EA580C" />
    </g>

    <!-- Right Yellow Bail -->
    <g transform="translate(254, 80) rotate(12)">
      <path d="M 0 10 Q 15 5 30 10 Q 35 15 40 10 Q 55 5 70 10 L 68 18 H 2 L 0 10 Z" fill="url(#bailYellow)" />
      <!-- Groves on the right bail -->
      <circle cx="10" cy="12" r="3" fill="#CA8A04" />
      <circle cx="20" cy="12" r="3" fill="#CA8A04" />
      <circle cx="50" cy="12" r="3" fill="#CA8A04" />
      <circle cx="60" cy="12" r="3" fill="#CA8A04" />
    </g>

    <!-- 5. Tilted Cricket Bat (Foreground) -->
    <g transform="rotate(-41 250 250)">
      <!-- Outer White Border Silhouette -->
      <rect x="214" y="86" width="72" height="308" rx="16" fill="#FFFFFF" />
      
      <!-- Bat Inner Left Side (Blue Gradient) -->
      <path d="M 218 100 
               C 218 94, 224 90, 230 90 
               L 250 90 
               L 250 390 
               L 230 390 
               C 224 390, 218 384, 218 378 Z" fill="url(#darkBlueGrad)" />
               
      <!-- Bat Inner Right Side (Yellow/Orange/Red Gradient) -->
      <path d="M 250 90 
               L 270 90 
               C 276 90, 282 94, 282 100 
               L 282 378 
               C 282 384, 276 390, 270 390 
               L 250 390 Z" fill="url(#yellowGrad)" />
      
      <!-- Diagonal highlight stripes on the bat face -->
      <path d="M 250 90 L 282 200 L 282 250 L 250 140 Z" fill="url(#orangeGrad)" opacity="0.95" />
      <path d="M 218 200 L 250 310 L 250 360 L 218 250 Z" fill="url(#blueGrad)" opacity="0.8" />
    </g>

  </g>
</svg>
